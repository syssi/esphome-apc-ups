substitutions:
  name: apc-ups
  device_description: "Monitor and control a APC UPS via RS232"
  external_components_source: github://syssi/esphome-apc-ups@main
  tx_pin: GPIO16
  rx_pin: GPIO17

esphome:
  name: ${name}
  friendly_name: ${name}
  comment: ${device_description}
  project:
    name: "syssi.esphome-apc-ups"
    version: 1.4.0

esp32:
  board: wemos_d1_mini32
  framework:
    type: esp-idf

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

ota:
  platform: esphome

logger:

# If you don't use Home Assistant please remove this `api` section and uncomment the `mqtt` component!
api:

# mqtt:
#   broker: !secret mqtt_host
#   username: !secret mqtt_username
#   password: !secret mqtt_password
#   id: mqtt_client

uart:
  - id: uart_0
    baud_rate: 2400
    tx_pin: ${tx_pin}
    rx_pin: ${rx_pin}
    debug:
      direction: BOTH
      dummy_receiver: false
      after:
        delimiter: "\n"
      sequence:
        - lambda: UARTDebug::log_string(direction, bytes);

apc_ups:
  - id: ups0
    uart_id: uart_0

binary_sensor:
  - platform: apc_ups
    apc_ups_id: ups0
    runtime_calibration:
      name: "runtime calibration"
    smart_trim:
      name: "smart trim"
    smart_boost:
      name: "smart boost"
    on_line:
      name: "on line"
    on_battery:
      name: "on battery"
    output_overloaded:
      name: "output overloaded"
    battery_low:
      name: "battery low"
    replace_battery:
      name: "replace battery"
    smart_mode:
      name: "smart mode"

switch:
  - platform: apc_ups
    apc_ups_id: ups0
    front_panel_test:
      name: "front panel test"
    simulate_power_failure:
      name: "simulate power failure"
    self_test:
      name: "self test"
    start_runtime_calibration:
      name: "start runtime calibration"

sensor:
  - platform: apc_ups
    apc_ups_id: ups0
    battery_voltage:
      name: "battery voltage"
    grid_frequency:
      name: "grid frequency"
    grid_voltage:
      name: "grid voltage"
    ac_output_voltage:
      name: "ac output voltage"
    ac_output_load:
      name: "ac output load"
    status_bitmask:
      name: "status bitmask"
    state_of_charge:
      name: "state of charge"
    estimated_runtime:
      name: "estimated runtime"
    internal_temperature:
      name: "internal temperature"
    ambient_temperature:
      name: "ambient temperature"
    max_grid_voltage:
      name: "max grid voltage"
    min_grid_voltage:
      name: "min grid voltage"
    nominal_battery_voltage:
      name: "nominal battery voltage"
    nominal_output_voltage:
      name: "nominal output voltage"

text_sensor:
  - platform: apc_ups
    apc_ups_id: ups0
    status:
      name: "status"
    cause_of_last_transfer:
      name: "cause of last transfer"
    # Could cause a connection reset of the Home Assistant API connection
    # See https://github.com/syssi/esphome-apc-ups/issues/1
    #
    # protocol_info:
    #   name: "protocol info"
    firmware_revision:
      name: "firmware revision"
    old_firmware_version:
      name: "old firmware version"
    manufacture_date:
      name: "manufacture date"
    last_battery_change_date:
      name: "last battery change date"
    local_identifier:
      name: "local identifier"
    serial_number:
      name: "serial number"
    self_test_results:
      name: "self test results"
    model_name:
      name: "model name"

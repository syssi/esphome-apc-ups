substitutions:
  name: esp32c6-compatibility-test
  device_description: "Verify the project builds from source on ESP32C6"
  external_components_source: github://syssi/esphome-apc-ups@main

esphome:
  name: ${name}
  friendly_name: ${name}
  comment: ${device_description}

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

ota:
  platform: esphome

logger:
  level: VERY_VERBOSE

api:
  reboot_timeout: 0s

uart:
  - id: uart_0
    baud_rate: 2400
    tx_pin: GPIO16
    rx_pin: GPIO17

apc_ups:
  - id: ups0
    uart_id: uart_0

sensor:
  - platform: apc_ups
    apc_ups_id: ups0
    battery_voltage:
      name: "battery voltage"
